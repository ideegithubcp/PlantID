services:
  - type: web
    name: plantid
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PLANTNET_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: PORT
        value: 10000
